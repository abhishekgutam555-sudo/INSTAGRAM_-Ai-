<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>InstaGrow AI</title>
<meta name="theme-color" content="#0f1410"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f1410;color:#e8f0e9;font-family:'Inter',system-ui,sans-serif;overflow-x:hidden}
#app{min-height:100vh;max-width:430px;margin:0 auto}

/* Colors */
:root{
  --bg:#0f1410;
  --bg2:#161d17;
  --bg3:#1c251d;
  --card:#1c251d;
  --border:rgba(74,186,74,.12);
  --green:#4aba4a;
  --green2:#6dcc6d;
  --green-glow:rgba(74,186,74,.2);
  --text:#e8f0e9;
  --text2:#8fa98f;
  --text3:#4a6b4a;
  --red:#ff4d4d;
  --yellow:#f5c842;
}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fillBar{from{width:0}to{width:var(--w)}}
@keyframes fillRing{from{stroke-dashoffset:var(--full)}to{stroke-dashoffset:var(--offset)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

.fade-up{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}
.fade-up-2{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .1s both}
.fade-up-3{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .2s both}

/* Inputs */
input,button,textarea{font-family:inherit}
input:focus{outline:none}

/* Scrollbar */
::-webkit-scrollbar{width:0}

/* ─── HOME ─────────────────────────────── */
.home{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 20px;
  position:relative;overflow:hidden;
}
.home-orb{
  position:absolute;border-radius:50%;pointer-events:none;filter:blur(70px);
}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-icon{
  width:72px;height:72px;border-radius:22px;
  background:linear-gradient(145deg,#2a4a2a,#1c351c);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;margin:0 auto 18px;
  box-shadow:0 0 40px var(--green-glow);
  animation:float 3s ease-in-out infinite;
}
.logo-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;color:var(--text)}
.logo-title span{color:var(--green)}
.logo-sub{font-size:13px;color:var(--text3)}

.features-grid{
  width:100%;display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:24px;
}
.feat-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px;
}
.feat-icon{font-size:18px;margin-bottom:6px}
.feat-label{font-size:12px;color:var(--text2);line-height:1.4}

.input-card{
  width:100%;background:var(--card);
  border:1px solid var(--border);border-radius:18px;padding:18px;
}
.input-wrap{position:relative;margin-bottom:12px}
.input-prefix{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;color:var(--text3);font-weight:500;
}
.main-input{
  width:100%;padding:14px 14px 14px 32px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;color:var(--text);font-size:14px;
  transition:border-color .2s;
}
.main-input:focus{border-color:var(--green)!important}
.main-input::placeholder{color:var(--text3)}
.btn-main{
  width:100%;padding:15px;border-radius:12px;
  background:linear-gradient(135deg,#2d5a2d,#1e3d1e);
  border:1px solid var(--green);
  color:var(--green);font-size:15px;font-weight:600;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px var(--green-glow);
}
.btn-main:hover{background:linear-gradient(135deg,#3a6e3a,#2a4e2a);box-shadow:0 6px 28px var(--green-glow)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{background:#1c251d;border-color:var(--text3);color:var(--text3);box-shadow:none;cursor:not-allowed}
.error-box{
  background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.2);
  border-radius:10px;padding:10px 12px;margin-bottom:12px;
  font-size:13px;color:#ff6b6b;
}
.home-footer{color:var(--text3);font-size:11px;text-align:center;margin-top:14px}

/* ─── LOADING ───────────────────────────── */
.loading{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.spinner{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--bg3);border-top:2px solid var(--green);
  animation:spin .8s linear infinite;margin-bottom:28px;
}
.load-title{font-size:16px;font-weight:600;margin-bottom:8px;text-align:center}
.load-sub{font-size:13px;color:var(--text3);animation:pulse 1.5s ease infinite;text-align:center}
.dots{display:flex;gap:6px;margin-top:24px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);transition:all .3s}
.dot.active{background:var(--green);width:20px;border-radius:3px}

/* ─── REPORT ────────────────────────────── */
.report{min-height:100vh;padding-bottom:48px}

/* Sticky header */
.rpt-header{
  background:rgba(15,20,16,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:14px 16px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.rpt-header-inner{display:flex;justify-content:space-between;align-items:center}
.rpt-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.rpt-username{font-size:18px;font-weight:700}
.health-badge{border-radius:10px;padding:5px 12px;font-size:11px;font-weight:700}

/* Score section */
.score-section{padding:20px 16px}
.score-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:20px 16px;text-align:center;
  position:relative;overflow:hidden;
}
.score-glow{
  position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  width:180px;height:180px;
  background:radial-gradient(circle,var(--green-glow) 0%,transparent 70%);
  pointer-events:none;
}
.score-ring-wrap{margin:0 auto 12px}
.verdict-text{font-size:13px;color:var(--text2);line-height:1.7;padding:0 8px;margin-top:4px}

/* Stats row */
.stats-section{padding:0 16px;margin-bottom:20px}
.stats-row{display:flex;gap:8px}
.stat-card{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px 8px;text-align:center;
}
.stat-val{font-size:16px;font-weight:700;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}

/* Section */
.section{padding:0 16px;margin-bottom:24px}
.sec-title{
  font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Reel card */
.reel-card{
  background:var(--card);border-radius:14px;padding:13px 14px;
  margin-bottom:8px;border:1px solid var(--border);
  cursor:pointer;transition:background .2s;
}
.reel-card:active{background:#202b21}
.reel-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.reel-num{
  width:26px;height:26px;border-radius:7px;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text3);font-weight:700;flex-shrink:0;
}
.reel-info{flex:1;min-width:0}
.reel-meta{font-size:10px;color:var(--text3);margin-bottom:3px}
.reel-caption{font-size:12px;color:var(--text2);line-height:1.4}
.status-badge{
  border-radius:7px;padding:3px 8px;
  font-size:10px;font-weight:700;white-space:nowrap;
  flex-shrink:0;margin-left:8px;
}
.metrics-row{display:flex;gap:5px;margin-bottom:8px}
.metric{
  flex:1;background:var(--bg3);border-radius:7px;
  padding:6px 3px;text-align:center;
}
.metric-icon{font-size:10px;margin-bottom:2px}
.metric-val{font-size:11px;color:var(--text2);font-weight:600}
.metric.highlight{border-radius:7px;}
.eng-bar-wrap{height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:6px}
.eng-bar-fill{height:100%;border-radius:99px;width:0;transition:width .8s cubic-bezier(.16,1,.3,1)}
.reel-analysis{
  background:var(--bg);border-radius:8px;padding:9px 11px;
  margin-top:8px;font-size:12px;color:var(--text3);line-height:1.7;
  display:none;
}
.reel-analysis.open{display:block}
.reel-toggle{text-align:center;font-size:10px;color:var(--text3);margin-top:6px}

/* Pattern cards */
.pattern-card{border-radius:14px;padding:14px;margin-bottom:8px}
.pattern-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.pattern-text{font-size:13px;color:var(--text2);line-height:1.8}

/* Mistake card */
.mistake-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:13px 14px;margin-bottom:8px;
}
.mistake-problem{font-size:13px;color:#ff6b6b;font-weight:500;margin-bottom:7px;display:flex;gap:8px;align-items:flex-start}
.divider-line{height:1px;background:var(--border);margin:7px 0}
.mistake-fix{font-size:13px;color:var(--green);display:flex;gap:8px;align-items:flex-start}

/* The One Thing */
.one-thing{
  background:linear-gradient(135deg,#1a2e1a,#141e14);
  border:1px solid rgba(74,186,74,.25);border-radius:16px;
  padding:16px;margin-bottom:24px;
}
.one-thing-label{font-size:10px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.one-thing-text{font-size:14px;color:var(--text);line-height:1.8;font-weight:500}

/* Blueprint */
.blueprint-card{
  background:linear-gradient(135deg,#141e14,#0f1410);
  border:1px solid rgba(74,186,74,.2);border-radius:18px;padding:18px;
}
.bp-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start}
.bp-icon{font-size:14px;width:22px;flex-shrink:0}
.bp-label{font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.bp-val{font-size:13px;color:var(--text);font-weight:500;line-height:1.4}
.bp-reasoning{
  margin-top:12px;background:rgba(74,186,74,.08);
  border-radius:10px;padding:11px 13px;border:1px solid rgba(74,186,74,.15);
}
.bp-reasoning p{font-size:12px;color:var(--green2);line-height:1.8}

/* Timeline */
.timeline{padding-left:4px}
.tl-item{display:flex;gap:12px;margin-bottom:16px}
.tl-left{display:flex;flex-direction:column;align-items:center}
.tl-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;
}
.tl-line{width:1px;flex:1;background:var(--border);margin-top:4px}
.tl-week{font-size:12px;font-weight:700;color:var(--green);margin-bottom:3px}
.tl-goal{font-size:11px;color:var(--text3);margin-bottom:4px}
.tl-action{font-size:13px;color:var(--text2);line-height:1.6}

/* Verdict */
.verdict-card{
  background:linear-gradient(135deg,#111d11,#0f1410);
  border:1px solid var(--border);border-radius:16px;padding:18px;
}
.verdict-head{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.verdict-avatar{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#2a4a2a,#1c351c);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.verdict-name{font-size:13px;font-weight:600}
.verdict-role{font-size:11px;color:var(--text3)}
.verdict-text-body{font-size:13px;color:var(--text2);line-height:2;white-space:pre-line}

/* Bottom actions */
.bottom-actions{display:flex;gap:10px;padding:0 16px;margin-top:8px}
.btn-back{
  flex:1;padding:13px;background:transparent;
  border:1px solid var(--border);border-radius:12px;
  color:var(--text3);font-size:13px;cursor:pointer;
}
.btn-share{
  flex:2;padding:13px;
  background:linear-gradient(135deg,#2d5a2d,#1e3d1e);
  border:1px solid var(--green);border-radius:12px;
  color:var(--green);font-size:13px;font-weight:600;cursor:pointer;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
var STATE = {
  screen: 'home',
  username: '',
  report: null,
  error: '',
  loadStep: 0,
  loadText: '',
  openReels: {}
};

var STAGES = [
  '👤 Profile data fetch ho raha hai...',
  '🎬 Last 10 reels scrape ho rahe hain...',
  '💬 Audience comments analyze ho rahe hain...',
  '🔍 Patterns aur insights nikaal rahe hain...',
  '✍️ ARIA expert report likh rahi hai...'
];

var TLDOTS = ['#4aba4a','#3da83d','#2d8a2d','#1e6b1e'];

function cleanUser(raw) {
  return raw.replace(/https?:\/\/(www\.)?instagram\.com\//g,'').replace('@','').replace(/\/$/,'').trim();
}

function fmt(n) {
  if(!n && n!==0) return '0';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return ''+n;
}

function scoreColor(s) {
  if(s>=70) return '#4aba4a';
  if(s>=45) return '#f5c842';
  return '#ff4d4d';
}

function statusCfg(s) {
  if(s==='viral') return {color:'#4aba4a',bg:'rgba(74,186,74,.1)',border:'rgba(74,186,74,.25)',emoji:'🔥',label:'VIRAL'};
  if(s==='average') return {color:'#f5c842',bg:'rgba(245,200,66,.1)',border:'rgba(245,200,66,.25)',emoji:'😐',label:'AVERAGE'};
  return {color:'#ff4d4d',bg:'rgba(255,77,77,.1)',border:'rgba(255,77,77,.25)',emoji:'💀',label:'FLOP'};
}

function healthColor(h) {
  if(h==='Healthy') return '#4aba4a';
  if(h==='Struggling') return '#ff4d4d';
  return '#f5c842';
}

/* ── RENDER FUNCTIONS ── */

function renderScoreRing(score) {
  var r=44, c=2*Math.PI*r;
  var col=scoreColor(score);
  var offset=c-(score/100)*c;
  return '<svg width="120" height="120" style="display:block;margin:0 auto">' +
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="var(--bg3)" stroke-width="8"/>' +
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8"' +
    ' stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"' +
    ' style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s cubic-bezier(.16,1,.3,1)"/>' +
    '<text x="60" y="55" text-anchor="middle" fill="'+col+'" font-family="Inter,sans-serif" font-size="26" font-weight="700">'+score+'</text>' +
    '<text x="60" y="70" text-anchor="middle" fill="var(--text3)" font-family="Inter,sans-serif" font-size="9" letter-spacing="1">SCORE</text>' +
    '</svg>';
}

function renderHome() {
  return '<div class="home">' +
    '<div class="home-orb" style="width:280px;height:280px;background:radial-gradient(circle,rgba(74,186,74,.1) 0%,transparent 70%);top:-80px;left:-60px"></div>' +
    '<div class="home-orb" style="width:200px;height:200px;background:radial-gradient(circle,rgba(74,186,74,.06) 0%,transparent 70%);bottom:60px;right:-60px"></div>' +
    '<div class="logo-wrap fade-up">' +
    '<div class="logo-icon">📊</div>' +
    '<div class="logo-title">Insta<span>Grow</span> AI</div>' +
    '<div class="logo-sub">Real data · Expert analysis · Instant report</div>' +
    '</div>' +
    '<div class="features-grid fade-up-2">' +
    '<div class="feat-item"><div class="feat-icon">📹</div><div class="feat-label">Last 10 reels ki real breakdown</div></div>' +
    '<div class="feat-item"><div class="feat-icon">🔥</div><div class="feat-label">Viral vs Flop pattern analysis</div></div>' +
    '<div class="feat-item"><div class="feat-icon">🚀</div><div class="feat-label">Agli reel ka exact blueprint</div></div>' +
    '<div class="feat-item"><div class="feat-icon">🎯</div><div class="feat-label">Expert verdict — seedha honest</div></div>' +
    '</div>' +
    '<div class="input-card fade-up-3">' +
    (STATE.error ? '<div class="error-box">⚠️ '+STATE.error+'</div>' : '') +
    '<div class="input-wrap">' +
    '<span class="input-prefix">@</span>' +
    '<input class="main-input" id="uname" type="text" placeholder="username ya instagram.com/username" value="'+STATE.username+'"/>' +
    '</div>' +
    '<button class="btn-main" id="btnGenerate">Analyze Karo →</button>' +
    '</div>' +
    '<div class="home-footer">Free · No login · ~60 seconds</div>' +
    '</div>';
}

function renderLoading() {
  var dots = STAGES.map(function(_,i){
    return '<div class="dot'+(i<=STATE.loadStep?' active':'')+'"></div>';
  }).join('');
  return '<div class="loading">' +
    '<div class="spinner"></div>' +
    '<div class="load-title">@'+cleanUser(STATE.username)+'</div>' +
    '<div class="load-sub">'+STATE.loadText+'</div>' +
    '<div class="dots">'+dots+'</div>' +
    '</div>';
}

function renderReport() {
  var r=STATE.report, ai=r.ai, reels=r.reels, score=r.score;
  var hc=healthColor(ai.account_health);
  var avgViews=Math.round(reels.reduce(function(s,x){return s+x.views},0)/reels.length);
  var avgEng=(reels.reduce(function(s,x){return s+parseFloat(x.engagementRate)},0)/reels.length).toFixed(1);
  var vCount=reels.filter(function(x){return x.status==='viral'}).length;
  var maxEng=Math.max.apply(null,reels.map(function(x){return parseFloat(x.engagementRate)}));

  var reelCards=reels.map(function(reel) {
    var sc=statusCfg(reel.status);
    var aiReel=(ai.reels_analysis||[]).filter(function(x){return x.number===reel.number})[0]||{};
    var engPct=Math.min(100,(parseFloat(reel.engagementRate)/Math.max(maxEng,1))*100);
    var isOpen=STATE.openReels[reel.number];
    return '<div class="reel-card" onclick="toggleReel('+reel.number+')">' +
      '<div class="reel-top">' +
      '<div class="reel-num">'+reel.number+'</div>' +
      '<div class="reel-info">' +
      '<div class="reel-meta">'+reel.daysAgo+' · '+reel.duration+'s</div>' +
      '<div class="reel-caption">'+reel.caption.slice(0,55)+(reel.caption.length>55?'...':'')+'</div>' +
      '</div>' +
      '<div class="status-badge" style="background:'+sc.bg+';border:1px solid '+sc.border+';color:'+sc.color+'">'+sc.emoji+' '+sc.label+'</div>' +
      '</div>' +
      '<div class="metrics-row">' +
      '<div class="metric"><div class="metric-icon">👁️</div><div class="metric-val">'+reel.viewsFmt+'</div></div>' +
      '<div class="metric"><div class="metric-icon">❤️</div><div class="metric-val">'+reel.likesFmt+'</div></div>' +
      '<div class="metric"><div class="metric-icon">💬</div><div class="metric-val">'+reel.commentsFmt+'</div></div>' +
      '<div class="metric highlight" style="background:'+sc.bg+';border:1px solid '+sc.border+'"><div class="metric-icon">📊</div><div class="metric-val" style="color:'+sc.color+'">'+reel.engagementRate+'%</div></div>' +
      '</div>' +
      '<div class="eng-bar-wrap"><div class="eng-bar-fill" style="width:'+engPct+'%;background:'+sc.color+'"></div></div>' +
      '<div class="reel-analysis'+(isOpen?' open':'')+'">'+((aiReel.status_reason||aiReel.algorithm_read)?((aiReel.algorithm_read?'<b style="color:var(--text3);font-size:11px">Algorithm: </b>'+aiReel.algorithm_read+'<br><br>':'')+(aiReel.status_reason||'')):'Analyzing...')+'</div>' +
      '<div class="reel-toggle">'+(isOpen?'▲ band karo':'▼ analysis dekho')+'</div>' +
      '</div>';
  }).join('');

  var bp=ai.next_reel_blueprint||{};
  var bpRows=[
    ['📌','Topic',bp.topic],['🎬','Hook',bp.hook_line||bp.hook],
    ['👁️','Visual',bp.hook_visual],['⏱️','Duration',bp.duration],
    ['🎵','Audio',bp.audio_strategy||bp.audio],
    ['📝','Caption',bp.caption_line_1||bp.caption_style],
    ['#️⃣','Hashtags',bp.hashtag_count],['🕐','Post Time',bp.post_day_time||bp.post_time]
  ].filter(function(x){return x[2]}).map(function(x,i,arr){
    return '<div class="bp-row" style="'+(i===arr.length-1?'border:none':'')+'"><div class="bp-icon">'+x[0]+'</div><div style="flex:1"><div class="bp-label">'+x[1]+'</div><div class="bp-val">'+x[2]+'</div></div></div>';
  }).join('');

  var tlItems=(ai.thirty_day_plan||[]).map(function(w,i,arr){
    return '<div class="tl-item">' +
      '<div class="tl-left">' +
      '<div class="tl-dot" style="background:'+TLDOTS[i]+';box-shadow:0 0 8px '+TLDOTS[i]+'80"></div>' +
      (i<arr.length-1?'<div class="tl-line"></div>':'') +
      '</div>' +
      '<div style="flex:1;padding-bottom:'+(i<arr.length-1?'16':'0')+'px">' +
      '<div class="tl-week">'+w.week+'</div>' +
      '<div class="tl-goal">Goal: '+(w.goal||w.focus||'')+'</div>' +
      '<div class="tl-action">'+(w.daily_action||w.action||'')+'</div>' +
      '</div></div>';
  }).join('');

  return '<div class="report">' +
    '<div class="rpt-header">' +
    '<div class="rpt-header-inner">' +
    '<div><div class="rpt-label">Instagram Report</div><div class="rpt-username">@'+r.username+'</div></div>' +
    '<div class="health-badge" style="background:'+hc+'15;border:1px solid '+hc+'30;color:'+hc+'">'+ai.account_health+'</div>' +
    '</div></div>' +

    '<div class="score-section">' +
    '<div class="score-card fade-up">' +
    '<div class="score-glow"></div>' +
    renderScoreRing(score) +
    '<div class="verdict-text">'+ai.verdict_line+'</div>' +
    '</div></div>' +

    '<div class="stats-section fade-up-2">' +
    '<div class="stats-row">' +
    '<div class="stat-card"><div class="stat-val">'+fmt(avgViews)+'</div><div class="stat-lbl">Avg Views</div></div>' +
    '<div class="stat-card"><div class="stat-val">'+vCount+'/10</div><div class="stat-lbl">Viral</div></div>' +
    '<div class="stat-card"><div class="stat-val">'+avgEng+'%</div><div class="stat-lbl">Avg Eng.</div></div>' +
    '</div></div>' +

    '<div class="section">' +
    '<div class="sec-title">📹 Last 10 Reels</div>' +
    reelCards +
    '</div>' +

    '<div class="section">' +
    '<div class="sec-title">🔍 Patterns</div>' +
    '<div class="pattern-card" style="background:rgba(74,186,74,.06);border:1px solid rgba(74,186,74,.15)">' +
    '<div class="pattern-label" style="color:var(--green)">🔥 Viral Pattern</div>' +
    '<div class="pattern-text">'+ai.viral_pattern+'</div>' +
    '</div>' +
    '<div class="pattern-card" style="background:rgba(255,77,77,.06);border:1px solid rgba(255,77,77,.15)">' +
    '<div class="pattern-label" style="color:#ff6b6b">💀 Flop Pattern</div>' +
    '<div class="pattern-text">'+ai.flop_pattern+'</div>' +
    '</div>' +
    '</div>' +

    (ai.the_one_thing ? '<div class="section"><div class="sec-title">⚡ The One Thing</div>' +
    '<div class="one-thing"><div class="one-thing-label">Game Changer Insight</div>' +
    '<div class="one-thing-text">'+ai.the_one_thing+'</div></div></div>' : '') +

    '<div class="section">' +
    '<div class="sec-title">⚠️ Fix These Now</div>' +
    (ai.top_3_mistakes||[]).map(function(m){
      return '<div class="mistake-card">' +
        '<div class="mistake-problem"><span>❌</span><span>'+(m.mistake||m.problem)+'</span></div>' +
        (m.why_it_hurts ? '<div style="font-size:11px;color:var(--text3);margin-bottom:7px;padding-left:20px">Algorithm impact: '+m.why_it_hurts+'</div>' : '') +
        '<div class="divider-line"></div>' +
        '<div class="mistake-fix"><span>✅</span><span>'+(m.exact_fix||m.fix)+'</span></div>' +
        '</div>';
    }).join('') +
    '</div>' +

    '<div class="section">' +
    '<div class="sec-title">🚀 Next Reel Blueprint</div>' +
    '<div class="blueprint-card">'+bpRows+
    (bp.why_this_works||bp.expected_result ? '<div class="bp-reasoning"><p>💡 '+(bp.why_this_works||bp.expected_result)+'</p></div>' : '') +
    '</div></div>' +

    '<div class="section">' +
    '<div class="sec-title">📅 30-Day Plan</div>' +
    '<div class="timeline">'+tlItems+'</div>' +
    '</div>' +

    '<div class="section">' +
    '<div class="sec-title">🎯 Expert Verdict</div>' +
    '<div class="verdict-card">' +
    '<div class="verdict-head">' +
    '<div class="verdict-avatar">🎯</div>' +
    '<div><div class="verdict-name">ARIA</div><div class="verdict-role">Instagram Growth Specialist</div></div>' +
    '</div>' +
    '<div style="height:1px;background:var(--border);margin-bottom:14px"></div>' +
    '<div class="verdict-text-body">'+ai.expert_verdict+'</div>' +
    '</div></div>' +

    '<div class="bottom-actions">' +
    '<button class="btn-back" onclick="goHome()">← New Report</button>' +
    '<button class="btn-share" onclick="shareReport()">Share Report 📤</button>' +
    '</div>' +
    '</div>';
}

/* ── MAIN RENDER ── */
function render() {
  var app=document.getElementById('app');
  if(STATE.screen==='home') app.innerHTML=renderHome();
  else if(STATE.screen==='loading') app.innerHTML=renderLoading();
  else if(STATE.screen==='report') app.innerHTML=renderReport();
  attachEvents();
}

function attachEvents() {
  var btn=document.getElementById('btnGenerate');
  var inp=document.getElementById('uname');
  if(inp) {
    inp.addEventListener('input', function(){STATE.username=this.value});
    inp.addEventListener('keydown', function(e){if(e.key==='Enter')generate()});
  }
  if(btn) btn.addEventListener('click', generate);
}

/* ── ACTIONS ── */
function toggleReel(num) {
  STATE.openReels[num]=!STATE.openReels[num];
  render();
}

function goHome() {
  STATE.screen='home'; STATE.report=null; STATE.username=''; STATE.error='';
  render();
}

function shareReport() {
  if(navigator.share) {
    navigator.share({title:'@'+STATE.report.username+' — InstaGrow AI Report',url:window.location.href});
  } else {
    var t=document.createElement('input');
    t.value=window.location.href;
    document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    alert('Link copied!');
  }
}

var loadInterval=null;
function generate() {
  var user=cleanUser(STATE.username);
  if(!user) return;
  STATE.error='';
  STATE.screen='loading';
  STATE.loadStep=0;
  STATE.loadText=STAGES[0];
  render();

  var step=0;
  loadInterval=setInterval(function(){
    step=Math.min(step+1,STAGES.length-1);
    STATE.loadStep=step; STATE.loadText=STAGES[step];
    render();
  },4000);

  fetch('/api/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:user})
  })
  .then(function(r){return r.json()})
  .then(function(data){
    clearInterval(loadInterval);
    if(data.error) throw new Error(data.error);
    STATE.report=data;
    STATE.screen='report';
    render();
    window.scrollTo(0,0);
  })
  .catch(function(e){
    clearInterval(loadInterval);
    STATE.error=e.message||'Kuch gadbad ho gayi. Dobara try karo.';
    STATE.screen='home';
    render();
  });
}

render();
</script>
