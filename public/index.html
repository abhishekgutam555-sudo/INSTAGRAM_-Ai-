<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>InstaGrow AI</title>
<meta name="theme-color" content="#050505"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#050505;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none}
#root{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-300% center}100%{background-position:300% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{width:0}to{width:var(--w)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #7c3aed30}50%{box-shadow:0 0 40px #7c3aed60}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.anim-fadeUp{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards}
.anim-fadeUp-2{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .12s forwards;opacity:0}
.anim-fadeUp-3{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .24s forwards;opacity:0}
.anim-fadeUp-4{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .36s forwards;opacity:0}
.anim-scaleIn{animation:scaleIn .4s cubic-bezier(.16,1,.3,1) forwards}

/* ── Typography ── */
.font-syne{font-family:'Syne',sans-serif}
.gradient-text{background:linear-gradient(135deg,#a78bfa,#7c3aed,#6d28d9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-warm{background:linear-gradient(135deg,#fb923c,#f97316,#ea580c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Glass Cards ── */
.glass{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.glass-hover{transition:background .2s,border .2s,transform .2s}
.glass-hover:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.10);transform:translateY(-1px)}

/* ── Inputs ── */
input,button{font-family:'Inter',sans-serif}
input::placeholder{color:#2a2a2a}
input:focus{outline:none;border-color:#7c3aed!important;box-shadow:0 0 0 3px rgba(124,58,237,.15)}

/* ── Premium Button ── */
.btn-primary{
  background:linear-gradient(135deg,#7c3aed,#6d28d9,#5b21b6,#7c3aed);
  background-size:300% 100%;animation:shimmer 3s linear infinite;
  border:none;cursor:pointer;color:#fff;
  font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.3px;
  transition:transform .15s,box-shadow .2s;
  box-shadow:0 4px 24px rgba(124,58,237,.3);
}
.btn-primary:hover{transform:scale(1.02);box-shadow:0 8px 32px rgba(124,58,237,.5)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{animation:none;background:#1a1a1a;color:#333;cursor:not-allowed;box-shadow:none}

/* ── Score Ring ── */
.score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* ── Progress Bar ── */
.prog-bar{height:4px;border-radius:99px;background:#111;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;animation:slideRight .8s cubic-bezier(.16,1,.3,1) .3s forwards;width:0}

/* ── Status badges ── */
.badge-viral{background:#00e67612;border:1px solid #00e67630;color:#00e676}
.badge-average{background:#ffb30012;border:1px solid #ffb30030;color:#ffb300}
.badge-flop{background:#ff174412;border:1px solid #ff174430;color:#ff1744}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}

/* ── Glow orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:0}

/* ── Sections ── */
.section{padding:0 16px;position:relative;z-index:1}
.section-gap{margin-top:28px}
.section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:#555;text-transform:uppercase;margin-bottom:12px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:4px 0}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Constants ── */
const STATUS = {
  viral:   { color:"#00e676", cls:"badge-viral",   emoji:"🔥", label:"VIRAL"   },
  average: { color:"#ffb300", cls:"badge-average", emoji:"😐", label:"AVERAGE" },
  flop:    { color:"#ff1744", cls:"badge-flop",    emoji:"💀", label:"FLOP"    },
};
const HEALTH_COLOR = { Healthy:"#00e676", Average:"#ffb300", Struggling:"#ff1744" };
const STAGES = [
  "Instagram profile scan ho raha hai...",
  "Last 10 reels fetch ho rahe hain...",
  "Viral aur flop patterns pakde ja rahe hain...",
  "AI expert report likh raha hai...",
];

/* ── Score Ring SVG ── */
function ScoreRing({ score }) {
  const r = 44, c = 2*Math.PI*r;
  const color = score>=70?"#00e676":score>=45?"#ffb300":"#ff1744";
  const offset = c - (score/100)*c;
  return (
    <div style={{ position:"relative", width:120, height:120, margin:"0 auto" }}>
      <svg width="120" height="120" style={{ transform:"rotate(-90deg)" }}>
        <circle cx="60" cy="60" r={r} fill="none" stroke="#111" strokeWidth="8"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={c} strokeDashoffset={offset}
          strokeLinecap="round" style={{ transition:"stroke-dashoffset 1s cubic-bezier(.16,1,.3,1)" }}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontFamily:"'Syne',sans-serif", fontSize:30, fontWeight:800, color, lineHeight:1 }}>{score}</span>
        <span style={{ fontSize:10, color:"#444", textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>Score</span>
      </div>
    </div>
  );
}

/* ── Stat Card ── */
function StatCard({ label, value, sub }) {
  return (
    <div className="glass" style={{ flex:1, borderRadius:14, padding:"12px 8px", textAlign:"center" }}>
      <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:800, marginBottom:2 }}>{value}</div>
      <div style={{ fontSize:10, color:"#444", textTransform:"uppercase", letterSpacing:.5 }}>{label}</div>
      {sub && <div style={{ fontSize:10, color:"#7c3aed", marginTop:2 }}>{sub}</div>}
    </div>
  );
}

/* ── Engagement Bar ── */
function EngBar({ rate, maxRate }) {
  const pct = Math.min(100, (parseFloat(rate)/Math.max(parseFloat(maxRate),1))*100);
  const color = parseFloat(rate)>5?"#00e676":parseFloat(rate)>2?"#ffb300":"#ff1744";
  return (
    <div className="prog-bar" style={{ marginTop:6 }}>
      <div className="prog-fill" style={{ "--w":`${pct}%`, background:color }} />
    </div>
  );
}

/* ── Reel Card ── */
function ReelCard({ reel, aiReel, maxEng }) {
  const [open, setOpen] = useState(false);
  const sc = STATUS[reel.status];
  return (
    <div className="glass glass-hover" onClick={()=>setOpen(!open)}
      style={{ borderRadius:14, padding:"13px 14px", marginBottom:8, cursor:"pointer", borderColor:`${sc.color}18` }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
        {/* Number badge */}
        <div style={{ width:28, height:28, borderRadius:8, background:"#111", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:"#444", fontWeight:700, flexShrink:0 }}>
          {reel.number}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
            <span style={{ fontSize:11, color:"#3a3a3a" }}>{reel.daysAgo} · {reel.duration}s</span>
            <span className={sc.cls} style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:6 }}>
              {sc.emoji} {sc.label}
            </span>
          </div>
          <p style={{ fontSize:12, color:"#888", lineHeight:1.4, marginBottom:8 }}>
            {reel.caption.slice(0,55)}{reel.caption.length>55?"...":""}
          </p>
          {/* Metrics row */}
          <div style={{ display:"flex", gap:12 }}>
            {[["👁️",reel.viewsFmt],["❤️",reel.likesFmt],["💬",reel.commentsFmt]].map(([ic,v],i)=>(
              <span key={i} style={{ fontSize:11, color:"#555" }}>{ic} {v}</span>
            ))}
            <span style={{ fontSize:11, color:sc.color, fontWeight:600, marginLeft:"auto" }}>{reel.engagementRate}%</span>
          </div>
          <EngBar rate={reel.engagementRate} maxRate={maxEng} />
        </div>
      </div>
      {/* Expanded analysis */}
      {open && aiReel?.status_reason && (
        <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid rgba(255,255,255,.05)" }}>
          <p style={{ fontSize:12, color:"#666", lineHeight:1.7 }}>{aiReel.status_reason}</p>
        </div>
      )}
      <div style={{ textAlign:"center", marginTop:6 }}>
        <span style={{ fontSize:10, color:"#2a2a2a" }}>{open?"▲ collapse":"▼ analysis dekho"}</span>
      </div>
    </div>
  );
}

/* ── Timeline Item ── */
function TimelineItem({ week, focus, action, index }) {
  const colors = ["#7c3aed","#6d28d9","#5b21b6","#4c1d95"];
  return (
    <div style={{ display:"flex", gap:12, marginBottom:16, paddingLeft:4 }}>
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
        <div style={{ width:10, height:10, borderRadius:"50%", background:colors[index]||"#7c3aed", flexShrink:0, boxShadow:`0 0 8px ${colors[index]}80`, marginTop:3 }} />
        {index<3 && <div style={{ width:1, flex:1, background:"rgba(255,255,255,.06)", marginTop:4 }} />}
      </div>
      <div style={{ flex:1, paddingBottom:index<3?16:0 }}>
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4 }}>
          <span style={{ fontFamily:"'Syne',sans-serif", fontSize:12, fontWeight:700, color:colors[index]||"#7c3aed" }}>{week}</span>
          <span style={{ fontSize:11, color:"#3a3a3a" }}>— {focus}</span>
        </div>
        <p style={{ fontSize:13, color:"#666", lineHeight:1.6 }}>{action}</p>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [screen, setScreen]     = useState("home");
  const [username, setUsername] = useState("");
  const [report, setReport]     = useState(null);
  const [stage, setStage]       = useState(0);
  const [loadTxt, setLoadTxt]   = useState(STAGES[0]);
  const [error, setError]       = useState("");

  const cleanUser = r => r.replace(/https?:\/\/(www\.)?instagram\.com\//g,"").replace("@","").replace(/\/$/,"").trim();

  const handleGenerate = async () => {
    const user = cleanUser(username);
    if (!user) return;
    setError(""); setScreen("loading"); setStage(0); setLoadTxt(STAGES[0]);

    let i=0;
    const iv = setInterval(()=>{ i=Math.min(i+1,STAGES.length-1); setStage(i); setLoadTxt(STAGES[i]); },4000);

    try {
      const res = await fetch("/api/analyze",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({username:user})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setReport(data);
      clearInterval(iv);
      setScreen("report");
    } catch(e) {
      clearInterval(iv);
      setError(e.message||"Kuch gadbad ho gayi. Dobara try karo.");
      setScreen("home");
    }
  };

  const reset = () => { setReport(null); setUsername(""); setError(""); setScreen("home"); };

  /* ══ HOME ══════════════════════════════════════════════════ */
  if (screen==="home") return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"28px 24px", position:"relative" }}>
      {/* Orbs */}
      <div className="orb" style={{ width:300, height:300, background:"#7c3aed18", top:-80, left:-60 }}/>
      <div className="orb" style={{ width:200, height:200, background:"#a78bfa10", bottom:100, right:-60 }}/>

      {/* Logo */}
      <div className="anim-fadeUp" style={{ textAlign:"center", marginBottom:36, position:"relative", zIndex:1 }}>
        <div style={{ width:76, height:76, borderRadius:22, background:"linear-gradient(135deg,#7c3aed,#5b21b6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:32, margin:"0 auto 18px", boxShadow:"0 0 48px #7c3aed50", animation:"float 3s ease-in-out infinite" }}>
          📊
        </div>
        <h1 className="font-syne" style={{ fontSize:28, fontWeight:800, marginBottom:8, letterSpacing:-.5 }}>
          <span className="gradient-text">InstaGrow</span> AI
        </h1>
        <p style={{ color:"#3a3a3a", fontSize:13 }}>Real data · AI expert · Instant report</p>
      </div>

      {/* Feature pills */}
      <div className="anim-fadeUp-2" style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:28, position:"relative", zIndex:1 }}>
        {["🎬 10 Reels Breakdown","🔥 Viral Pattern","🚀 Next Reel Blueprint","📅 30-Day Plan","🎯 Expert Verdict"].map((t,i)=>(
          <div key={i} className="glass" style={{ padding:"6px 12px", borderRadius:99, fontSize:12, color:"#888" }}>{t}</div>
        ))}
      </div>

      {/* Input card */}
      <div className="anim-fadeUp-3 glass" style={{ width:"100%", borderRadius:20, padding:20, position:"relative", zIndex:1 }}>
        <div style={{ position:"relative", marginBottom:12 }}>
          <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", fontSize:16 }}>@</span>
          <input type="text" placeholder="username ya instagram.com/username"
            value={username} onChange={e=>setUsername(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleGenerate()}
            style={{ width:"100%", padding:"14px 14px 14px 32px", background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:12, color:"#fff", fontSize:14 }}/>
        </div>
        {error && (
          <div style={{ background:"#ff174410", border:"1px solid #ff174425", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
            <p style={{ fontSize:13, color:"#ff4757" }}>⚠️ {error}</p>
          </div>
        )}
        <button onClick={handleGenerate} disabled={!username.trim()} className="btn-primary"
          style={{ width:"100%", padding:15, borderRadius:12, fontSize:15 }}>
          {username.trim() ? "Analyze Karo →" : "Username daalo pehle"}
        </button>
        <p style={{ fontSize:11, color:"#1e1e1e", textAlign:"center", marginTop:10 }}>Free · No login · ~60 seconds</p>
      </div>
    </div>
  );

  /* ══ LOADING ════════════════════════════════════════════════ */
  if (screen==="loading") return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, position:"relative" }}>
      <div className="orb" style={{ width:250, height:250, background:"#7c3aed15", top:"20%", left:"50%", transform:"translateX(-50%)" }}/>
      <div style={{ width:52, height:52, borderRadius:"50%", border:"2px solid #1a1a1a", borderTop:"2px solid #7c3aed", animation:"spin .8s linear infinite", marginBottom:28, position:"relative", zIndex:1 }}/>
      <p className="font-syne" style={{ fontSize:17, fontWeight:700, marginBottom:6, position:"relative", zIndex:1 }}>@{cleanUser(username)}</p>
      <p style={{ fontSize:13, color:"#444", animation:"pulse 1.5s ease infinite", textAlign:"center", position:"relative", zIndex:1 }}>{loadTxt}</p>
      <div style={{ display:"flex", gap:6, marginTop:24, position:"relative", zIndex:1 }}>
        {STAGES.map((_,i)=>(
          <div key={i} style={{ width:i===stage?20:6, height:6, borderRadius:99, background:i<=stage?"#7c3aed":"#1a1a1a", transition:"all .3s cubic-bezier(.16,1,.3,1)" }}/>
        ))}
      </div>
    </div>
  );

  /* ══ REPORT ═════════════════════════════════════════════════ */
  if (screen==="report" && report) {
    const { reels, ai, username:user, score } = report;
    const hc = HEALTH_COLOR[ai.account_health]||"#ffb300";
    const avgViews = Math.round(reels.reduce((s,r)=>s+r.views,0)/reels.length);
    const avgEng   = (reels.reduce((s,r)=>s+parseFloat(r.engagementRate),0)/reels.length).toFixed(1);
    const maxEng   = Math.max(...reels.map(r=>parseFloat(r.engagementRate)));
    const vCount   = reels.filter(r=>r.status==="viral").length;
    const fCount   = reels.filter(r=>r.status==="flop").length;
    const bp       = ai.next_reel_blueprint;

    return (
      <div style={{ minHeight:"100vh", paddingBottom:48 }}>

        {/* ── Sticky Header ── */}
        <div style={{ background:"rgba(5,5,5,.9)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", padding:"14px 16px", borderBottom:"1px solid rgba(255,255,255,.04)", position:"sticky", top:0, zIndex:50 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <p style={{ fontSize:10, color:"#2a2a2a", textTransform:"uppercase", letterSpacing:1, marginBottom:2 }}>Growth Report</p>
              <h1 className="font-syne" style={{ fontSize:18, fontWeight:800 }}>@{user}</h1>
            </div>
            <div style={{ background:hc+"15", border:`1px solid ${hc}30`, borderRadius:10, padding:"5px 12px", fontSize:11, color:hc, fontWeight:700 }}>
              {ai.account_health}
            </div>
          </div>
        </div>

        {/* ── Hero Score Section ── */}
        <div className="section anim-fadeUp" style={{ marginTop:20 }}>
          <div className="glass" style={{ borderRadius:20, padding:"20px 16px", textAlign:"center", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:-40, left:"50%", transform:"translateX(-50%)", width:200, height:200, background:`radial-gradient(circle, ${hc}18 0%, transparent 70%)`, pointerEvents:"none" }}/>
            <ScoreRing score={score}/>
            <p style={{ fontSize:13, color:"#555", marginTop:12, lineHeight:1.7, padding:"0 8px" }}>
              {ai.verdict_line}
            </p>
          </div>
        </div>

        {/* ── Stats ── */}
        <div className="section section-gap anim-fadeUp-2">
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            <StatCard label="Avg Views"   value={avgViews>=1000?(avgViews/1000).toFixed(1)+"K":""+avgViews} sub={null}/>
            <StatCard label="Viral"       value={vCount+"/10"} sub={null}/>
            <StatCard label="Avg Eng."    value={avgEng+"%"} sub={null}/>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <StatCard label="Flop Reels"  value={fCount+"/10"} sub={null}/>
            <StatCard label="Best Eng."   value={maxEng.toFixed(1)+"%"} sub={null}/>
            <StatCard label="Reels"       value="10" sub="Analyzed"/>
          </div>
        </div>

        {/* ── Reels Breakdown ── */}
        <div className="section section-gap">
          <p className="section-title">📹 Reels Breakdown</p>
          {reels.map((reel,i)=>(
            <ReelCard key={i} reel={reel} maxEng={maxEng}
              aiReel={(ai.reels_analysis||[]).find(r=>r.number===reel.number)}/>
          ))}
        </div>

        {/* ── Patterns ── */}
        <div className="section section-gap">
          <p className="section-title">🔍 Patterns</p>
          <div style={{ background:"linear-gradient(135deg,rgba(0,230,118,.06),rgba(0,230,118,.02))", border:"1px solid rgba(0,230,118,.15)", borderRadius:14, padding:14, marginBottom:10 }}>
            <p style={{ fontSize:11, color:"#00e676", fontWeight:700, textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>🔥 Viral Pattern</p>
            <p style={{ fontSize:13, color:"#999", lineHeight:1.8 }}>{ai.viral_pattern}</p>
          </div>
          <div style={{ background:"linear-gradient(135deg,rgba(255,23,68,.06),rgba(255,23,68,.02))", border:"1px solid rgba(255,23,68,.15)", borderRadius:14, padding:14 }}>
            <p style={{ fontSize:11, color:"#ff1744", fontWeight:700, textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>💀 Flop Pattern</p>
            <p style={{ fontSize:13, color:"#999", lineHeight:1.8 }}>{ai.flop_pattern}</p>
          </div>
        </div>

        {/* ── Mistakes ── */}
        <div className="section section-gap">
          <p className="section-title">⚠️ Fix These Now</p>
          {(ai.top_3_mistakes||[]).map((m,i)=>(
            <div key={i} className="glass" style={{ borderRadius:14, padding:"13px 14px", marginBottom:8 }}>
              <div style={{ display:"flex", gap:10, alignItems:"flex-start", marginBottom:8 }}>
                <div style={{ width:22, height:22, borderRadius:6, background:"#ff174415", border:"1px solid #ff174430", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, flexShrink:0 }}>❌</div>
                <p style={{ fontSize:13, color:"#ff5252", fontWeight:500, lineHeight:1.4 }}>{m.problem}</p>
              </div>
              <div className="divider"/>
              <div style={{ display:"flex", gap:10, alignItems:"flex-start", marginTop:8 }}>
                <div style={{ width:22, height:22, borderRadius:6, background:"#00e67615", border:"1px solid #00e67630", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, flexShrink:0 }}>✅</div>
                <p style={{ fontSize:13, color:"#00e676", lineHeight:1.4 }}>{m.fix}</p>
              </div>
            </div>
          ))}
        </div>

        {/* ── Next Reel Blueprint ── */}
        <div className="section section-gap">
          <p className="section-title">🚀 Next Reel Blueprint</p>
          {bp && (
            <div style={{ background:"linear-gradient(135deg,#1a0a40,#0d0d1a)", borderRadius:18, padding:"18px 16px", border:"1px solid rgba(124,58,237,.25)", boxShadow:"0 0 32px rgba(124,58,237,.1)" }}>
              {[
                ["📌","Topic", bp.topic],
                ["🎬","Hook", bp.hook],
                ["⏱️","Duration", bp.duration],
                ["🎵","Audio", bp.audio],
                ["📝","Caption", bp.caption_style],
                ["🕐","Post Time", bp.post_time],
              ].map(([ic,lb,vl],i)=>(
                <div key={i} style={{ display:"flex", gap:12, paddingTop:10, paddingBottom:10, borderBottom:i<5?"1px solid rgba(255,255,255,.04)":"none" }}>
                  <span style={{ fontSize:15, width:22, flexShrink:0 }}>{ic}</span>
                  <div style={{ flex:1 }}>
                    <p style={{ fontSize:10, color:"#3a3a3a", textTransform:"uppercase", letterSpacing:.5, marginBottom:3 }}>{lb}</p>
                    <p style={{ fontSize:13, color:"#e2e2e2", fontWeight:500, lineHeight:1.4 }}>{vl}</p>
                  </div>
                </div>
              ))}
              <div style={{ marginTop:14, background:"rgba(124,58,237,.12)", borderRadius:10, padding:"12px 14px", border:"1px solid rgba(124,58,237,.2)" }}>
                <p style={{ fontSize:12, color:"#a78bfa", lineHeight:1.8 }}>💡 {bp.why_this_works}</p>
              </div>
            </div>
          )}
        </div>

        {/* ── 30 Day Timeline ── */}
        <div className="section section-gap">
          <p className="section-title">📅 30-Day Plan</p>
          <div className="glass" style={{ borderRadius:16, padding:"16px 14px" }}>
            {(ai.thirty_day_plan||[]).map((w,i)=>(
              <TimelineItem key={i} week={w.week} focus={w.focus} action={w.action} index={i}/>
            ))}
          </div>
        </div>

        {/* ── Expert Verdict ── */}
        <div className="section section-gap">
          <p className="section-title">🎯 Expert Verdict</p>
          <div style={{ background:"linear-gradient(135deg,#080f1e,#050505)", borderRadius:16, padding:"18px 16px", border:"1px solid rgba(99,102,241,.12)" }}>
            <div style={{ display:"flex", gap:10, marginBottom:14 }}>
              <div style={{ width:36, height:36, borderRadius:10, background:"linear-gradient(135deg,#7c3aed,#5b21b6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>🎯</div>
              <div>
                <p className="font-syne" style={{ fontSize:13, fontWeight:700 }}>Expert Analysis</p>
                <p style={{ fontSize:11, color:"#3a3a3a" }}>AI-powered · Data-backed · Honest</p>
              </div>
            </div>
            <div className="divider" style={{ marginBottom:14 }}/>
            <p style={{ fontSize:13, color:"#888", lineHeight:2, whiteSpace:"pre-line" }}>{ai.expert_verdict}</p>
          </div>
        </div>

        {/* ── Action Bar ── */}
        <div className="section section-gap" style={{ display:"flex", gap:10 }}>
          <button onClick={reset} style={{ flex:1, padding:13, background:"transparent", border:"1px solid rgba(255,255,255,.06)", borderRadius:12, color:"#444", fontSize:13, cursor:"pointer" }}>
            ← New Report
          </button>
          <button onClick={()=>{ if(navigator.share){ navigator.share({title:`@${user} — InstaGrow AI Report`, url:window.location.href}) } }}
            className="btn-primary" style={{ flex:2, padding:13, borderRadius:12, fontSize:13 }}>
            Share Report 📤
          </button>
        </div>

      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
